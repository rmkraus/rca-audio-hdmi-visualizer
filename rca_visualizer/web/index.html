<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Now Playing</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body data-sign-light="off">
  <div id="stats" class="stats">Status: Waiting | Shazam Requests: 0 reqs, 0 reqs/m</div>
  <main class="app">
    <section class="board" aria-label="Now playing split-flap display">
      <div class="display-stack">
        <div class="display-row">
          <div class="row-label" aria-label="Track"></div>
          <div id="line-track" class="display line"></div>
        </div>
        <div class="display-row title-continuation-row">
          <div class="row-label continuation-label" aria-label="Track continued"></div>
          <div id="line-track-2" class="display line"></div>
        </div>
        <div class="display-row">
          <div class="row-label" aria-label="Artist"></div>
          <div id="line-artist" class="display line"></div>
        </div>
        <div class="display-row record-row">
          <div class="row-label" aria-label="Record"></div>
          <div id="line-record" class="display line"></div>
        </div>
        <div class="display-row time-row">
          <div class="row-label time-label" aria-label="Elapsed time"></div>
          <div id="line-time" class="display line time-display"></div>
        </div>
        <div class="display-row progress-row">
          <div class="row-label progress-label" aria-label="Progress"></div>
          <div id="line-progress" class="bulb-progress" aria-label="Track progress"></div>
        </div>
      </div>

      <aside id="lyrics-panel" class="lyrics-panel" aria-label="Synced lyrics CRT">
        <div class="lyrics-title">LYRICS</div>
        <div id="lyrics-lines" class="lyrics-lines"></div>
      </aside>

      <div class="controls" aria-label="Appliance controls">
        <div class="transport-control">
          <div class="control-label status-label">STATUS</div>
          <div class="transport-lights">
            <div class="lamp-stack">
              <div id="status-play" class="lamp play" aria-hidden="true"></div>
              <div class="control-label small">PLAY</div>
            </div>
            <div class="lamp-stack">
              <div id="status-stop" class="lamp stop" aria-hidden="true"></div>
              <div class="control-label small">STOP</div>
            </div>
            <div class="lamp-stack">
              <div id="status-listening" class="lamp listening" aria-hidden="true"></div>
              <div class="control-label small">LISTEN</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
