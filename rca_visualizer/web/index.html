<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Now Playing</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="stats" class="stats">Status: Waiting | Shazam Requests: 0 reqs, 0 reqs/m</div>
  <main class="app">
    <section class="board" aria-label="Now playing split-flap display">
      <div class="display-row">
        <div class="row-label" aria-label="Track">
          <svg class="label-icon" viewBox="0 0 512 512" aria-hidden="true">
            <path d="M499.1 6.3c8.1 6.1 12.9 15.6 12.9 25.7v320c0 35.3-43 64-96 64s-96-28.7-96-64 43-64 96-64c17.7 0 34.2 3.2 48 8.8V131.8L192 190.1V416c0 35.3-43 64-96 64S0 451.3 0 416s43-64 96-64c17.7 0 34.2 3.2 48 8.8V160c0-15.1 10.5-28.2 25.3-31.4l304-64c9.9-2.1 20.4.2 28.5 6.3z"/>
          </svg>
        </div>
        <div id="line-track" class="display line"></div>
      </div>
      <div class="display-row">
        <div class="row-label" aria-label="Artist">
          <svg class="label-icon" viewBox="0 0 448 512" aria-hidden="true">
            <path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3 0 498.7 13.3 512 29.7 512h388.6c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304h-91.4z"/>
          </svg>
        </div>
        <div id="line-artist" class="display line"></div>
      </div>
      <div class="display-row">
        <div class="row-label" aria-label="Record">
          <svg class="label-icon" viewBox="0 0 512 512" aria-hidden="true">
            <path d="M256 8a248 248 0 1 0 0 496 248 248 0 1 0 0-496zm0 152a96 96 0 1 1 0 192 96 96 0 1 1 0-192zm0 128a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/>
          </svg>
        </div>
        <div id="line-record" class="display line"></div>
      </div>
      <div class="display-row time-row">
        <div class="row-label time-label" aria-label="Elapsed time">
          <svg class="label-icon" viewBox="0 0 512 512" aria-hidden="true">
            <path d="M256 0a256 256 0 1 0 0 512A256 256 0 1 0 256 0zm24 120v120l88 52.8c11.4 6.8 15 21.5 8.2 32.9s-21.5 15-32.9 8.2l-100-60c-7.2-4.3-11.3-12.1-11.3-20.6V120c0-13.3 10.7-24 24-24s24 10.7 24 24z"/>
          </svg>
        </div>
        <div class="time-display-frame">
          <div id="time-current-mm" class="time-display digits-2"></div>
          <div class="metal-separator">:</div>
          <div id="time-current-ss" class="time-display digits-2"></div>
          <div class="metal-separator slash">/</div>
          <div id="time-total-mm" class="time-display digits-2"></div>
          <div class="metal-separator">:</div>
          <div id="time-total-ss" class="time-display digits-2"></div>
        </div>
      </div>
      <div class="display-row progress-row">
        <div class="row-label progress-label" aria-label="Progress">
          <svg class="label-icon" viewBox="0 0 512 512" aria-hidden="true">
            <path d="M64 96C28.7 96 0 124.7 0 160v192c0 35.3 28.7 64 64 64h352c35.3 0 64-28.7 64-64v-16h8c13.3 0 24-10.7 24-24V200c0-13.3-10.7-24-24-24h-8v-16c0-35.3-28.7-64-64-64H64zm32 96h288v128H96V192z"/>
          </svg>
        </div>
        <div id="line-progress" class="display line progress-line"></div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
